services:
  postgres:
    image: postgres:16-alpine
    container_name: glorybank-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glorybank
      POSTGRES_USER: glorybank_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - glorybank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glorybank_user -d glorybank"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: glorybank-app:latest
    container_name: glorybank-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://glorybank_user:${DB_PASSWORD}@postgres:5432/glorybank?schema=public
    networks:
      - glorybank-net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: glorybank-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/landing.html:/etc/nginx/html/landing.html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - glorybank-net

volumes:
  postgres_data:
  nginx_logs:

networks:
  glorybank-net:
    driver: bridge
