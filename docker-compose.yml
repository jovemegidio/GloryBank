services:
  postgres:
    image: postgres:16-alpine
    container_name: credbusiness-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: credbusiness
      POSTGRES_USER: credbusiness_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credbusiness-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credbusiness_user -d credbusiness"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: credbusiness-app:latest
    container_name: credbusiness-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://credbusiness_user:${DB_PASSWORD}@postgres:5432/credbusiness?schema=public
    networks:
      - credbusiness-net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: credbusiness-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./public/brand-mark.svg:/etc/nginx/html/favicon.svg:ro
      - ./public/asaas-logo.svg:/etc/nginx/html/asaas-logo.svg:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - credbusiness-net

  certbot:
    image: certbot/certbot:latest
    container_name: credbusiness-certbot
    profiles:
      - certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt

volumes:
  postgres_data:
  nginx_logs:

networks:
  credbusiness-net:
    driver: bridge
